<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu | Brew Haven</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600&display=swap" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #1e1e2f, #2c2c3e);
            color: white;
            padding: 15px;
            font-family: 'Poppins', sans-serif;
            min-height: 100vh;
        }

        .header { text-align: center; margin-bottom: 20px; }
        .header h1 { font-size: 24px; color: #ff7b54; }

        .menu {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            padding-bottom: 100px; /* Space for fixed button */
        }

        .item {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(12px);
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: 0.3s;
        }

        .item:hover { transform: translateY(-5px); border-color: #ff7b54; }

        .item h3 { font-size: 18px; margin-bottom: 10px; }

        .item button {
            width: 100%;
            padding: 10px;
            border: none;
            border-radius: 10px;
            background: linear-gradient(45deg, #ff7b54, #ff4d6d);
            color: white;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
        }

        .cart-btn {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 500px;
            z-index: 100;
        }

        .cart-btn button {
            width: 100%;
            padding: 15px;
            border-radius: 15px;
            background: #ffffff;
            border: none;
            color: #1e1e2f;
            font-size: 18px;
            font-weight: 600;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            cursor: pointer;
        }

        .toast {
            position: fixed;
            bottom: 90px;
            left: 50%;
            transform: translateX(-50%);
            background: #10b981;
            color: white;
            padding: 10px 20px;
            border-radius: 30px;
            font-size: 14px;
            z-index: 1000;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        /* Loading Spinner */
        .loader {
            text-align: center;
            margin-top: 50px;
            font-style: italic;
            color: #94a3b8;
        }
    </style>
</head>

<body>

    <div class="header">
        <h1>☕ Brew Haven Menu</h1>
        <p id="tableInfo">Loading table info...</p>
    </div>

    <div class="menu" id="menu">
        <div class="loader">Fetching delicious items... ☕</div>
    </div>

    <div class="cart-btn">
        <button onclick="goToCart()">View Cart 🛒 <span id="cartCount"></span></button>
    </div>

<script>
    // 🔗 API Configuration
    const API_BASE = "https://brew-haven-backend-pgyl.onrender.com";
    
    const params = new URLSearchParams(window.location.search);
    const table = params.get("table") || 1;
    document.getElementById("tableInfo").innerText = "Table #" + table;

    const menuDiv = document.getElementById("menu");

    // 📥 FETCH MENU FROM BACKEND
    async function loadMenu() {
        try {
            const response = await fetch(`${API_BASE}/api/menu`);
            if (!response.ok) throw new Error("Failed to fetch menu");
            
            const data = await response.json();
            renderMenu(data);
        } catch (error) {
            console.error("Menu Error:", error);
            menuDiv.innerHTML = `<p style="text-align:center;">Failed to load menu. Is the backend running? 😴</p>`;
        }
    }

    function renderMenu(items) {
        menuDiv.innerHTML = "";

        if (!items || items.length === 0) {
            menuDiv.innerHTML = "<p style='text-align:center;'>No items available 😢</p>";
            return;
        }

        items.forEach(item => {
            // Price calculation (handle discount if it exists in DB)
            const discount = item.discount || 0;
            const finalPrice = item.price - (item.price * discount / 100);

            const div = document.createElement("div");
            div.classList.add("item");

            div.innerHTML = `
                <h3>${item.name}</h3>
                ${
                    discount > 0
                    ? `<p><del style="color:#94a3b8">₹${item.price}</del> <b style="color:#ff7b54">₹${finalPrice}</b></p>`
                    : `<p>₹${item.price}</p>`
                }
                <button onclick="addToCart('${item.name}', ${finalPrice})">Add to Cart</button>
            `;
            menuDiv.appendChild(div);
        });
    }

    // 🛒 CART LOGIC
    function addToCart(name, price) {
        let cart = JSON.parse(localStorage.getItem("cart")) || [];
        cart.push({ name, price, qty: 1 });
        localStorage.setItem("cart", JSON.stringify(cart));

        updateCartCount();
        showToast(name + " added ✅");
    }

    function updateCartCount() {
        let cart = JSON.parse(localStorage.getItem("cart")) || [];
        const countSpan = document.getElementById("cartCount");
        countSpan.innerText = cart.length > 0 ? `(${cart.length})` : "";
    }

    function goToCart() {
        window.location.href = `cart.html?table=${table}`;
    }

    function showToast(msg) {
        const existingToast = document.querySelector(".toast");
        if (existingToast) existingToast.remove();

        const toast = document.createElement("div");
        toast.className = "toast";
        toast.innerText = msg;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 2000);
    }

    // Initial Load
    loadMenu();
    updateCartCount();

    // 🛡️ Table Security Check (Optional - fetches from LocalStorage for now)
    const tables = JSON.parse(localStorage.getItem("tables")) || [];
    const tableData = tables.find(t => t.tableNo == table);
    if (tableData && tableData.active === false) {
        document.body.innerHTML = `<div style="text-align:center; margin-top:100px;"><h2>🚫 Table Disabled</h2><p>Please contact staff.</p></div>`;
    }
</script>

</body>
</html>
