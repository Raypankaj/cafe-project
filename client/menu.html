<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Menu</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600&display=swap" rel="stylesheet">

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: linear-gradient(135deg, #1e1e2f, #2c2c3e);
      color: white;
      padding: 15px 15px 90px;
      font-family: "Poppins", sans-serif;
    }

    .header {
      text-align: center;
      margin-bottom: 20px;
    }

    .header h1 {
      margin-bottom: 8px;
    }

    .menu {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 15px;
    }

    .item {
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(12px);
      padding: 15px;
      border-radius: 12px;
      text-align: center;
      box-shadow: 0 10px 20px rgba(0, 0, 0, 0.18);
    }

    .item h3 {
      margin-bottom: 8px;
      font-size: 18px;
    }

    .item p {
      margin-bottom: 12px;
    }

    .item button {
      padding: 8px 12px;
      border: none;
      border-radius: 8px;
      background: linear-gradient(45deg, #ff7b54, #ff4d6d);
      color: white;
      cursor: pointer;
    }

    .cart-btn {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      width: min(420px, calc(100% - 30px));
    }

    .cart-btn button {
      width: 100%;
      padding: 12px;
      border-radius: 12px;
      background: linear-gradient(45deg, #ff7b54, #ff4d6d);
      border: none;
      color: white;
      font-size: 16px;
      cursor: pointer;
    }

    .toast {
      position: fixed;
      bottom: 88px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0, 0, 0, 0.85);
      padding: 10px 14px;
      border-radius: 8px;
      z-index: 10;
      white-space: nowrap;
    }

    .empty,
    .blocked {
      text-align: center;
      margin-top: 50px;
      opacity: 0.9;
    }
  </style>
</head>

<body>
  <div class="header">
    <h1>Brew Haven Menu</h1>
    <p id="tableInfo"></p>
  </div>

  <div class="menu" id="menu"></div>

  <div class="cart-btn">
    <button id="cartBtn" onclick="goToCart()">Go to Cart</button>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const table = params.get("table") || "1";
    const cartKey = "cart";

    const tableInfo = document.getElementById("tableInfo");
    const menuDiv = document.getElementById("menu");
    const cartBtn = document.getElementById("cartBtn");

    tableInfo.innerText = "Table #" + table;

    function getMenuItems() {
      return JSON.parse(localStorage.getItem("menu")) || [];
    }

    function getTables() {
      return JSON.parse(localStorage.getItem("tables")) || [];
    }

    function getTableData() {
      return getTables().find((item) => String(item.tableNo) === String(table));
    }

    function isTableDisabled() {
      const tableData = getTableData();
      return !!(tableData && tableData.active === false);
    }

    function formatPrice(value) {
      return Math.round(Number(value) || 0);
    }

    function getDiscountedPrice(item) {
      const basePrice = Number(item.price) || 0;
      const discount = Number(item.discount) || 0;
      const finalPrice = basePrice - (basePrice * discount / 100);
      return formatPrice(finalPrice);
    }

    function goToCart() {
      if (isTableDisabled()) {
        showBlockedState();
        return;
      }

      window.location.href = `cart.html?table=${encodeURIComponent(table)}`;
    }

    function addToCart(item) {
      if (isTableDisabled()) {
        showBlockedState();
        return;
      }

      const cart = JSON.parse(localStorage.getItem(cartKey)) || [];
      const price = getDiscountedPrice(item);

      const existingItem = cart.find((cartItem) => cartItem.name === item.name);

      if (existingItem) {
        existingItem.qty = (existingItem.qty || 1) + 1;
      } else {
        cart.push({
          name: item.name,
          price: price,
          qty: 1
        });
      }

      localStorage.setItem(cartKey, JSON.stringify(cart));
      showToast(item.name + " added");
    }

    function showBlockedState() {
      menuDiv.innerHTML = `
        <div class="blocked">
          <h2>Table Disabled</h2>
          <p>This table is currently not accepting orders.</p>
        </div>
      `;
      cartBtn.disabled = true;
    }

    function renderMenu() {
      const menuItems = getMenuItems();

      if (isTableDisabled()) {
        showBlockedState();
        return;
      }

      cartBtn.disabled = false;
      menuDiv.innerHTML = "";

      if (menuItems.length === 0) {
        menuDiv.innerHTML = "<p class='empty'>No items available</p>";
        return;
      }

      menuItems.forEach((item) => {
        const finalPrice = getDiscountedPrice(item);
        const itemCard = document.createElement("div");
        const nameEl = document.createElement("h3");
        const priceEl = document.createElement("p");
        const buttonEl = document.createElement("button");

        itemCard.className = "item";
        nameEl.innerText = item.name;

        if (Number(item.discount) > 0) {
          priceEl.innerHTML = `<del>Rs ${formatPrice(item.price)}</del> Rs ${finalPrice}`;
        } else {
          priceEl.innerText = "Rs " + finalPrice;
        }

        buttonEl.innerText = "Add";
        buttonEl.onclick = () => addToCart(item);

        itemCard.appendChild(nameEl);
        itemCard.appendChild(priceEl);
        itemCard.appendChild(buttonEl);
        menuDiv.appendChild(itemCard);
      });
    }

    function showToast(message) {
      const oldToast = document.querySelector(".toast");
      if (oldToast) {
        oldToast.remove();
      }

      const toast = document.createElement("div");
      toast.className = "toast";
      toast.innerText = message;
      document.body.appendChild(toast);

      setTimeout(() => {
        toast.remove();
      }, 1500);
    }

    window.addEventListener("storage", (event) => {
      if (event.key === "menu" || event.key === "tables") {
        renderMenu();
      }
    });

    window.addEventListener("focus", renderMenu);

    renderMenu();
  </script>
</body>
</html>
