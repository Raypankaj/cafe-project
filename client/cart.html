<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Your Cart</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #f3e7d6;
      --paper: #fbf3e8;
      --paper-soft: #fff8ef;
      --wood: #5b3825;
      --wood-dark: #351d13;
      --coffee: #7b4b2a;
      --coffee-deep: #4b2c1d;
      --accent: #d47a2a;
      --accent-dark: #a35315;
      --danger: #b84f36;
      --text: #2f2018;
      --muted: #6f5748;
      --line: rgba(91, 56, 37, 0.16);
      --shadow: 0 18px 40px rgba(52, 27, 16, 0.14);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      background:
        radial-gradient(circle at top, rgba(255, 255, 255, 0.3), transparent 30%),
        linear-gradient(180deg, #f5ebdd, #ead9c4);
      color: var(--text);
      font-family: "Poppins", sans-serif;
      padding-bottom: 120px;
    }

    .topbar {
      background:
        linear-gradient(rgba(50, 28, 18, 0.35), rgba(50, 28, 18, 0.35)),
        linear-gradient(180deg, #6b422b, #4b2c1d);
      color: #fff8ef;
      border-bottom: 2px dashed rgba(255, 240, 220, 0.28);
      position: sticky;
      top: 0;
      z-index: 20;
    }

    .topbar-inner {
      max-width: 1180px;
      margin: 0 auto;
      padding: 18px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 18px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      font-family: "Cormorant Garamond", serif;
      font-size: 2rem;
      font-weight: 700;
    }

    .brand-mark {
      font-size: 2rem;
    }

    .table-pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 16px;
      border-radius: 999px;
      background: rgba(255, 248, 238, 0.12);
      color: #fffaf2;
      border: 1px solid rgba(255, 239, 219, 0.22);
      backdrop-filter: blur(6px);
      font-size: 0.95rem;
    }

    .page-shell {
      max-width: 1180px;
      margin: 0 auto;
      background: var(--paper);
      box-shadow: var(--shadow);
      border-left: 1px solid rgba(91, 56, 37, 0.1);
      border-right: 1px solid rgba(91, 56, 37, 0.1);
    }

    .hero {
      padding: 46px 38px 38px;
      border-bottom: 2px dashed rgba(91, 56, 37, 0.18);
      background:
        linear-gradient(90deg, rgba(53, 29, 19, 0.72) 0%, rgba(53, 29, 19, 0.45) 42%, rgba(53, 29, 19, 0.16) 100%),
        url("https://placehold.co/1600x620/8b5e3c/f8f1e5?text=Your+Cart");
      background-size: cover;
      background-position: center;
      color: #fffaf3;
    }

    .hero h1 {
      font-family: "Cormorant Garamond", serif;
      font-size: clamp(2.8rem, 5vw, 4.4rem);
      line-height: 0.95;
      margin-bottom: 12px;
    }

    .hero p {
      max-width: 520px;
      line-height: 1.75;
      color: rgba(255, 248, 239, 0.88);
    }

    .section {
      padding: 36px 38px;
    }

    .section-heading {
      display: flex;
      align-items: center;
      gap: 18px;
      justify-content: center;
      margin-bottom: 26px;
      color: var(--coffee-deep);
    }

    .section-heading::before,
    .section-heading::after {
      content: "";
      flex: 1;
      max-width: 220px;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(91, 56, 37, 0.28), transparent);
    }

    .section-heading h2 {
      font-family: "Cormorant Garamond", serif;
      font-size: clamp(2.2rem, 4vw, 3.1rem);
      font-weight: 700;
      white-space: nowrap;
    }

    #cartItems {
      display: grid;
      gap: 18px;
    }

    .item {
      display: grid;
      grid-template-columns: 170px 1fr auto;
      gap: 18px;
      align-items: center;
      background: var(--paper-soft);
      border: 1px solid rgba(91, 56, 37, 0.12);
      box-shadow: 0 16px 34px rgba(64, 33, 20, 0.08);
      overflow: hidden;
    }

    .item img {
      width: 100%;
      height: 100%;
      min-height: 170px;
      object-fit: cover;
    }

    .item-content {
      padding: 20px 0;
    }

    .item-head {
      display: flex;
      justify-content: space-between;
      gap: 14px;
      align-items: baseline;
      margin-bottom: 10px;
    }

    .item h3 {
      font-family: "Cormorant Garamond", serif;
      font-size: 2rem;
      font-weight: 700;
      color: var(--coffee-deep);
      line-height: 0.95;
    }

    .item .line {
      color: var(--muted);
      margin-bottom: 6px;
    }

    .item-total {
      font-weight: 700;
      color: var(--coffee);
      font-size: 1.1rem;
    }

    .remove-wrap {
      padding: 20px 20px 20px 0;
    }

    .item button {
      border: none;
      border-radius: 12px;
      padding: 11px 16px;
      background: linear-gradient(180deg, #c4694c, #9d3f24);
      color: #fff;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
    }

    .summary-box {
      margin-top: 28px;
      background:
        linear-gradient(rgba(50, 28, 18, 0.22), rgba(50, 28, 18, 0.22)),
        linear-gradient(180deg, #6b422b, #4b2c1d);
      color: #fff4e7;
      border-radius: 22px;
      padding: 26px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 18px;
      box-shadow: 0 18px 32px rgba(53, 29, 19, 0.2);
    }

    .summary-box h3 {
      font-family: "Cormorant Garamond", serif;
      font-size: 2.2rem;
      margin-bottom: 6px;
    }

    .summary-box p {
      color: rgba(255, 243, 225, 0.82);
    }

    #totalAmount {
      font-family: "Cormorant Garamond", serif;
      font-size: 2.6rem;
      font-weight: 700;
      white-space: nowrap;
    }

    .cart-btn {
      position: fixed;
      left: 50%;
      bottom: 18px;
      transform: translateX(-50%);
      width: min(760px, calc(100% - 24px));
      z-index: 30;
    }

    .cart-btn button {
      width: 100%;
      border: none;
      border-radius: 18px;
      padding: 16px 20px;
      background: linear-gradient(180deg, #e68d39, #bf5e1a);
      color: #fff;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      box-shadow: 0 18px 34px rgba(53, 29, 19, 0.22);
    }

    .cart-btn button:disabled {
      opacity: 0.7;
      cursor: not-allowed;
    }

    .empty {
      text-align: center;
      padding: 60px 20px;
      background: rgba(255, 255, 255, 0.45);
      border: 1px dashed rgba(91, 56, 37, 0.2);
      color: var(--muted);
    }

    @media (max-width: 980px) {
      .topbar-inner,
      .hero,
      .section {
        padding-left: 22px;
        padding-right: 22px;
      }

      .item {
        grid-template-columns: 1fr;
      }

      .item img {
        min-height: 220px;
      }

      .item-content,
      .remove-wrap {
        padding: 18px;
      }

      .remove-wrap {
        padding-top: 0;
      }

      .summary-box {
        flex-direction: column;
        align-items: flex-start;
      }
    }

    @media (max-width: 640px) {
      .topbar-inner {
        flex-direction: column;
        align-items: stretch;
      }

      .section-heading {
        gap: 10px;
      }

      .section-heading::before,
      .section-heading::after {
        max-width: 80px;
      }

      .section-heading h2 {
        white-space: normal;
        text-align: center;
      }
    }
  </style>
</head>

<body>
  <header class="topbar">
    <div class="topbar-inner">
      <div class="brand">
        <span class="brand-mark">☕</span>
        <span>Brew Haven</span>
      </div>

      <div class="table-pill">Table <strong id="tableInfo">#1</strong></div>
    </div>
  </header>

  <main class="page-shell">
    <section class="hero">
      <h1>Your Cart</h1>
      <p>Review your cafe picks, adjust item quantities and place your order when you are ready.</p>
    </section>

    <section class="section">
      <div class="section-heading">
        <h2>Selected Items</h2>
      </div>

      <div id="cartItems"></div>

      <div class="summary-box">
        <div>
          <h3>Order Summary</h3>
          <p>Freshly prepared after you place your order</p>
        </div>
        <div id="totalAmount">Rs 0</div>
      </div>
    </section>
  </main>

  <div class="cart-btn">
    <button id="orderBtn" onclick="placeOrder()">Place Order</button>
  </div>

  <script>
    const BASE_URL = "https://brew-haven-backend-pgyl.onrender.com";
    const ORDER_API_URL = `${BASE_URL}/api/orders`;
    const CART_KEY = "cart";

    const params = new URLSearchParams(window.location.search);
    const table = params.get("table") || 1;

    const tableInfo = document.getElementById("tableInfo");
    const cartDiv = document.getElementById("cartItems");
    const totalAmount = document.getElementById("totalAmount");
    const orderBtn = document.getElementById("orderBtn");

    tableInfo.innerText = "#" + table;

    const imageMap = {
      coffee: "https://placehold.co/700x520/9b6a47/fff5ea?text=Coffee",
      dessert: "https://placehold.co/700x520/8f5a47/fff2ea?text=Dessert",
      snack: "https://placehold.co/700x520/9a6a42/fff3e7?text=Snack",
      default: "https://placehold.co/700x520/8d6243/fff2e4?text=Brew+Haven"
    };

    let cart = [];
    let total = 0;

    function getCart() {
      return JSON.parse(localStorage.getItem(CART_KEY)) || [];
    }

    function saveCart(updatedCart) {
      localStorage.setItem(CART_KEY, JSON.stringify(updatedCart));
      cart = updatedCart;
    }

    function detectItemImage(name) {
      const value = String(name || "").toLowerCase();

      if (value.includes("coffee") || value.includes("latte") || value.includes("cappuccino") || value.includes("brew") || value.includes("tea")) {
        return imageMap.coffee;
      }

      if (value.includes("cake") || value.includes("muffin") || value.includes("cookie") || value.includes("brownie") || value.includes("cheese")) {
        return imageMap.dessert;
      }

      if (value.includes("pasta") || value.includes("croissant") || value.includes("sandwich") || value.includes("burger") || value.includes("snack")) {
        return imageMap.snack;
      }

      return imageMap.default;
    }

    function renderCart() {
      cart = getCart();
      cartDiv.innerHTML = "";
      total = 0;

      if (cart.length === 0) {
        cartDiv.innerHTML = "<p class='empty'>Your cart is empty</p>";
        totalAmount.innerText = "Rs 0";
        return;
      }

      cart.forEach((item, index) => {
        const itemPrice = Number(item.price) || 0;
        const itemQty = Number(item.qty) || 1;
        const itemTotal = itemPrice * itemQty;
        const imageSrc = detectItemImage(item.name);

        total += itemTotal;

        cartDiv.innerHTML += `
          <article class="item">
            <img src="${imageSrc}" alt="${item.name}">
            <div class="item-content">
              <div class="item-head">
                <h3>${item.name}</h3>
                <div class="item-total">Rs ${itemTotal}</div>
              </div>
              <p class="line">Quantity: ${itemQty}</p>
              <p class="line">Price per item: Rs ${itemPrice}</p>
              <p class="line">Prepared fresh after order confirmation</p>
            </div>
            <div class="remove-wrap">
              <button onclick="removeItem(${index})">Remove</button>
            </div>
          </article>
        `;
      });

      totalAmount.innerText = "Rs " + total;
    }

    function removeItem(index) {
      cart = getCart();

      if (!cart[index]) return;

      if ((Number(cart[index].qty) || 1) > 1) {
        cart[index].qty = (Number(cart[index].qty) || 1) - 1;
      } else {
        cart.splice(index, 1);
      }

      saveCart(cart);
      renderCart();
    }

    async function placeOrder() {
      const tables = JSON.parse(localStorage.getItem("tables")) || [];
      const tableData = tables.find((t) => String(t.tableNo) === String(table));

      if (tableData && tableData.active === false) {
        alert("This table is currently disabled. Please contact staff.");
        return;
      }

      cart = getCart();

      if (cart.length === 0) {
        alert("Cart is empty!");
        return;
      }

      renderCart();

      orderBtn.innerText = "Placing...";
      orderBtn.disabled = true;

      try {
        const payload = {
          table: Number(table),
          items: cart.map((item) => ({
            name: item.name,
            price: Number(item.price) || 0,
            qty: Number(item.qty) || 1
          })),
          total: Number(total)
        };

        const response = await fetch(ORDER_API_URL, {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify(payload)
        });

        const raw = await response.text();
        let data = {};

        try {
          data = raw ? JSON.parse(raw) : {};
        } catch (e) {
          throw new Error(raw || "Invalid server response");
        }

        if (!response.ok) {
          throw new Error(data.message || "Failed to place order");
        }

        localStorage.removeItem(CART_KEY);
        window.location.href = `order.html?id=${data._id}`;
      } catch (error) {
        console.log(error);
        alert(error.message || "Error placing order");
        orderBtn.innerText = "Place Order";
        orderBtn.disabled = false;
      }
    }

    window.addEventListener("focus", renderCart);
    window.addEventListener("storage", (event) => {
      if (event.key === CART_KEY) {
        renderCart();
      }
    });

    renderCart();
  </script>
</body>
</html>
