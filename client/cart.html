<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cart</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      background: #0f172a;
      color: white;
      padding: 15px;
    }

    .header {
      text-align: center;
      margin-bottom: 20px;
    }

    .header h1 {
      font-size: 22px;
    }

    #cartItems {
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    .item {
      background: #1e293b;
      padding: 15px;
      border-radius: 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .item h3 {
      font-size: 16px;
    }

    .item button {
      background: #ef4444;
      border: none;
      padding: 6px 10px;
      border-radius: 6px;
      color: white;
      cursor: pointer;
    }

    .total {
      margin-top: 20px;
      text-align: center;
      font-size: 18px;
    }

    .cart-btn {
      margin-top: 20px;
      text-align: center;
    }

    .cart-btn button {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 10px;
      background: linear-gradient(45deg, #ff7b54, #ff4d6d);
      color: white;
      font-size: 16px;
      cursor: pointer;
    }

    .cart-btn button:disabled {
      opacity: 0.7;
      cursor: not-allowed;
    }

    .empty {
      text-align: center;
      margin-top: 50px;
      opacity: 0.6;
    }
  </style>
</head>

<body>
  <div class="header">
    <h1>Your Cart</h1>
    <p id="tableInfo"></p>
  </div>

  <div id="cartItems"></div>

  <div class="total">
    <h3 id="totalAmount">Total: Rs 0</h3>
  </div>

  <div class="cart-btn">
    <button id="orderBtn" onclick="placeOrder()">Place Order</button>
  </div>

  <script>
    const ORDER_API_URL = "https://brew-haven-backend.onrender.com/api/orders";

    const params = new URLSearchParams(window.location.search);
    const table = params.get("table") || 1;
    const tableInfo = document.getElementById("tableInfo");
    const cartDiv = document.getElementById("cartItems");
    const totalAmount = document.getElementById("totalAmount");
    const orderBtn = document.getElementById("orderBtn");

    tableInfo.innerText = "Table #" + table;

    let cart = JSON.parse(localStorage.getItem("cart")) || [];
    let total = 0;

    function renderCart() {
      cartDiv.innerHTML = "";
      total = 0;

      if (cart.length === 0) {
        cartDiv.innerHTML = "<p class='empty'>Your cart is empty</p>";
        totalAmount.innerText = "Total: Rs 0";
        return;
      }

      cart.forEach((item, index) => {
        const itemPrice = Number(item.price) || 0;
        total += itemPrice;

        cartDiv.innerHTML += `
          <div class="item">
            <div>
              <h3>${item.name}</h3>
              <p>Rs ${itemPrice}</p>
            </div>
            <button onclick="removeItem(${index})">Remove</button>
          </div>
        `;
      });

      totalAmount.innerText = "Total: Rs " + total;
    }

    function removeItem(index) {
      cart.splice(index, 1);
      localStorage.setItem("cart", JSON.stringify(cart));
      renderCart();
    }

    async function placeOrder() {
      const tables = JSON.parse(localStorage.getItem("tables")) || [];
      const tableData = tables.find((t) => t.tableNo == table);

      if (tableData && tableData.active === false) {
        alert("This table is currently disabled. Please contact staff.");
        return;
      }

      if (cart.length === 0) {
        alert("Cart is empty!");
        return;
      }

      orderBtn.innerText = "Placing...";
      orderBtn.disabled = true;

      try {
        const response = await fetch(ORDER_API_URL, {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            table: table,
            items: cart,
            total: total
          })
        });

        const data = await response.json();

        if (!response.ok) {
          throw new Error(data.message || "Failed to place order");
        }

        localStorage.removeItem("cart");
        window.location.href = `order.html?id=${data._id}`;
      } catch (error) {
        alert(error.message || "Error placing order");
        console.log(error);
        orderBtn.innerText = "Place Order";
        orderBtn.disabled = false;
      }
    }

    renderCart();
  </script>
</body>
</html>
