<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cart</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Poppins", sans-serif;
    }

    body {
      background: #0f172a;
      color: white;
      padding: 15px;
    }

    .header {
      text-align: center;
      margin-bottom: 20px;
    }

    .header h1 {
      font-size: 22px;
    }

    #cartItems {
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    .item {
      background: #1e293b;
      padding: 15px;
      border-radius: 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
    }

    .item h3 {
      font-size: 16px;
      margin-bottom: 6px;
    }

    .item p {
      margin-bottom: 4px;
      opacity: 0.9;
    }

    .item button {
      background: #ef4444;
      border: none;
      padding: 8px 12px;
      border-radius: 6px;
      color: white;
      cursor: pointer;
      white-space: nowrap;
    }

    .total {
      margin-top: 20px;
      text-align: center;
      font-size: 18px;
    }

    .cart-btn {
      margin-top: 20px;
      text-align: center;
    }

    .cart-btn button {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 10px;
      background: linear-gradient(45deg, #ff7b54, #ff4d6d);
      color: white;
      font-size: 16px;
      cursor: pointer;
    }

    .cart-btn button:disabled {
      opacity: 0.7;
      cursor: not-allowed;
    }

    .empty {
      text-align: center;
      margin-top: 50px;
      opacity: 0.6;
    }
  </style>
</head>

<body>
  <div class="header">
    <h1>Your Cart</h1>
    <p id="tableInfo"></p>
  </div>

  <div id="cartItems"></div>

  <div class="total">
    <h3 id="totalAmount">Total: Rs 0</h3>
  </div>

  <div class="cart-btn">
    <button id="orderBtn" onclick="placeOrder()">Place Order</button>
  </div>

  <script>
    const BASE_URL = "https://brew-haven-backend-pgyl.onrender.com";
    const ORDER_API_URL = `${BASE_URL}/api/orders`;
    const CART_KEY = "cart";

    const params = new URLSearchParams(window.location.search);
    const table = params.get("table") || 1;

    const tableInfo = document.getElementById("tableInfo");
    const cartDiv = document.getElementById("cartItems");
    const totalAmount = document.getElementById("totalAmount");
    const orderBtn = document.getElementById("orderBtn");

    tableInfo.innerText = "Table #" + table;

    let cart = [];
    let total = 0;

    function getCart() {
      return JSON.parse(localStorage.getItem(CART_KEY)) || [];
    }

    function saveCart(updatedCart) {
      localStorage.setItem(CART_KEY, JSON.stringify(updatedCart));
      cart = updatedCart;
    }

    function renderCart() {
      cart = getCart();
      cartDiv.innerHTML = "";
      total = 0;

      if (cart.length === 0) {
        cartDiv.innerHTML = "<p class='empty'>Your cart is empty</p>";
        totalAmount.innerText = "Total: Rs 0";
        return;
      }

      cart.forEach((item, index) => {
        const itemPrice = Number(item.price) || 0;
        const itemQty = Number(item.qty) || 1;
        const itemTotal = itemPrice * itemQty;

        total += itemTotal;

        cartDiv.innerHTML += `
          <div class="item">
            <div>
              <h3>${item.name}</h3>
              <p>Qty: ${itemQty}</p>
              <p>Price: Rs ${itemPrice}</p>
              <p>Item Total: Rs ${itemTotal}</p>
            </div>
            <button onclick="removeItem(${index})">Remove</button>
          </div>
        `;
      });

      totalAmount.innerText = "Total: Rs " + total;
    }

    function removeItem(index) {
      cart = getCart();

      if (!cart[index]) return;

      if ((Number(cart[index].qty) || 1) > 1) {
        cart[index].qty = (Number(cart[index].qty) || 1) - 1;
      } else {
        cart.splice(index, 1);
      }

      saveCart(cart);
      renderCart();
    }

    async function placeOrder() {
      const tables = JSON.parse(localStorage.getItem("tables")) || [];
      const tableData = tables.find((t) => String(t.tableNo) === String(table));

      if (tableData && tableData.active === false) {
        alert("This table is currently disabled. Please contact staff.");
        return;
      }

      cart = getCart();

      if (cart.length === 0) {
        alert("Cart is empty!");
        return;
      }

      renderCart();

      orderBtn.innerText = "Placing...";
      orderBtn.disabled = true;

      try {
        const payload = {
          table: Number(table),
          items: cart.map((item) => ({
            name: item.name,
            price: Number(item.price) || 0,
            qty: Number(item.qty) || 1
          })),
          total: Number(total)
        };

        const response = await fetch(ORDER_API_URL, {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify(payload)
        });

        const raw = await response.text();
        let data = {};

        try {
          data = raw ? JSON.parse(raw) : {};
        } catch (e) {
          throw new Error(raw || "Invalid server response");
        }

        if (!response.ok) {
          throw new Error(data.message || "Failed to place order");
        }

        localStorage.removeItem(CART_KEY);
        window.location.href = `order.html?id=${data._id}`;
      } catch (error) {
        console.log(error);
        alert(error.message || "Error placing order");
        orderBtn.innerText = "Place Order";
        orderBtn.disabled = false;
      }
    }

    window.addEventListener("focus", renderCart);
    window.addEventListener("storage", (event) => {
      if (event.key === CART_KEY) {
        renderCart();
      }
    });

    renderCart();
  </script>
</body>
</html>
