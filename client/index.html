<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Brew Haven Cafe</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Poppins", sans-serif;
    }

    body {
      overflow: hidden;
      color: white;
      background: linear-gradient(135deg, #1e1e2f, #2c2c3e);
    }

    #bg-video {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: -2;
      opacity: 0.6;
    }

    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(30, 30, 47, 0.7);
      z-index: -1;
    }

    .container {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 20px;
    }

    h1 {
      font-size: 32px;
      margin-bottom: 10px;
    }

    p {
      opacity: 0.85;
      margin-bottom: 20px;
    }

    .table {
      margin-bottom: 14px;
      font-size: 18px;
    }

    .status {
      min-height: 24px;
      margin-bottom: 20px;
      font-size: 14px;
      color: #ffd166;
    }

    button {
      padding: 12px 25px;
      border: none;
      border-radius: 10px;
      background: linear-gradient(45deg, #ff7b54, #ff4d6d);
      color: white;
      font-size: 16px;
      cursor: pointer;
      transition: transform 0.3s ease, opacity 0.3s ease;
    }

    button:hover {
      transform: scale(1.05);
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.65;
      transform: none;
    }

    @media (max-width: 500px) {
      h1 {
        font-size: 24px;
      }
    }
  </style>
</head>

<body>
  <video autoplay muted loop playsinline id="bg-video">
    <source src="assets/images/cafe.mp4" type="video/mp4">
  </video>

  <div class="overlay"></div>

  <div class="container">
    <h1>Brew Haven</h1>
    <p>Experience the taste of perfection</p>

    <div class="table">
      Table No: <span id="tableNo">#1</span>
    </div>

    <div class="status" id="tableStatus"></div>

    <button id="menuBtn" onclick="goToMenu()">View Menu</button>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const table = params.get("table") || "1";

    const tableNoEl = document.getElementById("tableNo");
    const tableStatusEl = document.getElementById("tableStatus");
    const menuBtn = document.getElementById("menuBtn");

    tableNoEl.innerText = "#" + table;

    function getTableConfig() {
      const tables = JSON.parse(localStorage.getItem("tables")) || [];
      return tables.find((item) => String(item.tableNo) === String(table));
    }

    function validateTableAccess() {
      if (!table || Number(table) < 1) {
        tableStatusEl.innerText = "Invalid table number.";
        menuBtn.disabled = true;
        return false;
      }

      const tableConfig = getTableConfig();

      if (tableConfig && tableConfig.active === false) {
        tableStatusEl.innerText = "This table is currently disabled. Please contact staff.";
        menuBtn.disabled = true;
        return false;
      }

      tableStatusEl.innerText = "";
      menuBtn.disabled = false;
      return true;
    }

    function goToMenu() {
      if (!validateTableAccess()) {
        return;
      }

      window.location.href = `menu.html?table=${encodeURIComponent(table)}`;
    }

    window.addEventListener("focus", validateTableAccess);

    validateTableAccess();
  </script>
</body>
</html>
