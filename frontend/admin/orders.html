<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Orders Dashboard</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      background: linear-gradient(135deg, #1e1e2f, #2c2c3e);
      color: white;
    }

    /* Header */
    .header {
      text-align: center;
      padding: 20px;
    }

    .header h1 {
      font-size: 26px;
    }

    /* Orders container */
    #orders {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 20px;
      padding: 20px;
    }

    /* Order Card */
    .order-card {
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(12px);
      border-radius: 15px;
      padding: 20px;
      transition: 0.3s;
      border: 1px solid rgba(255,255,255,0.1);
    }

    .order-card:hover {
      transform: translateY(-5px);
    }

    .order-card h3 {
      margin-bottom: 10px;
    }

    .order-card p {
      font-size: 14px;
      opacity: 0.8;
    }

    /* Status colors */
    .new {
      color: #ffd166;
    }

    .accepted {
      color: #06d6a0;
    }

    .done {
      color: #00b4d8;
    }

    /* Buttons */
    .order-card button {
      margin-top: 10px;
      margin-right: 5px;
      padding: 8px 12px;
      border: none;
      border-radius: 8px;
      background: linear-gradient(45deg, #ff7b54, #ff4d6d);
      color: white;
      cursor: pointer;
    }

    .order-card button:hover {
      opacity: 0.9;
    }

    /* Back button */
    .back-btn {
      margin: 10px 20px;
      display: inline-block;
      cursor: pointer;
      font-size: 14px;
      opacity: 0.8;
    }

  </style>
</head>

<body>

  <!-- Header -->
  <div class="header">
    <h1>📦 Live Orders</h1>
  </div>

  <!-- Back -->
  <div class="back-btn" onclick="goBack()">⬅ Back</div>

  <!-- Orders -->
  <div id="orders"></div>

  <!-- 🔥 Socket CDN -->
  <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>

  <!-- 🔌 Socket -->
  <script src="js/socket.js"></script>

  <!-- 🧠 Admin -->
  <script src="js/admin.js"></script>

  <script>
    function goBack() {
      window.location.href = "index.html";
    }
  </script>

</body>
</html>
